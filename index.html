<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FelisHub | Gestão de Abrigos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        :root {
            --primary-color: #ff8a5c;
            --primary-hover: #e57c50;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --border-color: #e2e8f0;
            --danger-color: #ef4444;
            --success-color: #22c55e;
            --cti-color: #3b82f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            min-height: 100vh;
            line-height: 1.4;
        }

        /* Transição global para suavizar interações */
        * {
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        /* Sidebar Elegante */
        aside {
            width: 260px;
            background-color: #ffffff;
            border-right: 1px solid var(--border-color);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            height: 100vh;
            box-shadow: 2px 0 10px rgba(0,0,0,0.02);
            z-index: 10;
        }

        aside h1 {
            font-size: 1.6rem;
            margin: 0 0 5px 0;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        aside p.subtitle {
            font-size: 0.85rem;
            color: #64748b;
            margin: 0 0 30px 0;
        }

        .tab-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 10px;
            border: none;
            background: none;
            text-align: left;
            font-size: 1rem;
            font-weight: 600;
            color: #475569;
            cursor: pointer;
            border-radius: 12px;
        }

        .tab-btn.active {
            background-color: var(--primary-color);
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(255, 138, 92, 0.25);
        }

        .tab-btn:hover:not(.active) {
            background-color: #f1f5f9;
            color: var(--primary-color);
            transform: translateX(3px);
        }

        .btn-admit-trigger {
            margin-top: 20px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(255, 138, 92, 0.2);
        }

        .btn-admit-trigger:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
            font-size: 0.85rem;
            color: #64748b;
            text-align: center;
        }

        /* Área de Conteúdo Principal */
        main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
            animation: fadeInUp 0.4s ease-out forwards;
        }

        /* Top Bar de Pesquisa */
        .search-bar-container {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            align-items: center;
        }

        .search-input-wrapper {
            position: relative;
            flex: 1;
        }

        .search-input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .search-input-wrapper input {
            padding-left: 45px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border-color);
            border-radius: 10px;
            font-size: 0.95rem;
            background-color: #fff;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(255, 138, 92, 0.15);
        }

        /* Grid de Cards de Gatinhos */
        .cats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        /* Card de Gatinho Moderno */
        .cat-card {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            text-align: center;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .cat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
        }

        /* Estilo para CTI com indicador de atenção clínica */
        .cat-card.status-cti {
            border: 1.5px solid rgba(59, 130, 246, 0.3);
            animation: border-pulse 3s infinite;
        }

        @keyframes border-pulse {
            0% { border-color: rgba(59, 130, 246, 0.3); }
            50% { border-color: rgba(59, 130, 246, 0.8); }
            100% { border-color: rgba(59, 130, 246, 0.3); }
        }

        .cat-card img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 3px solid #f1f5f9;
        }

        .cat-card .placeholder-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #f1f5f9;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin: 0 auto 15px auto;
            border: 3px solid #e2e8f0;
        }

        .cat-card h3 {
            margin: 0 0 5px 0;
            font-size: 1.2rem;
            color: #1e293b;
        }

        .cat-card p {
            margin: 0;
            font-size: 0.85rem;
            color: #64748b;
        }

        .cat-card .badge-status {
            display: inline-block;
            margin-top: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            color: #fff;
        }

        .badge-cti { background-color: var(--cti-color); }
        .badge-gatil { background-color: var(--success-color); }

        /* MODAL GERAL (Fundo Desfocado) */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(4px);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: #ffffff;
            border-radius: 20px;
            width: 90%;
            max-width: 800px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 30px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.5rem;
            color: #64748b;
            cursor: pointer;
            border: none;
            background: none;
        }

        .close-modal:hover {
            color: var(--danger-color);
        }

        /* Estrutura do Prontuário Individual */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .profile-header img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary-color);
        }

        .profile-header .placeholder-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background-color: #f1f5f9;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            border: 3px solid #e2e8f0;
        }

        .profile-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .profile-block {
            background-color: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
        }

        .profile-block h4 {
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 1px solid #cbd5e1;
            padding-bottom: 8px;
            color: #334155;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .timeline-item {
            font-size: 0.9rem;
            padding: 8px 0;
            border-bottom: 1px dashed var(--border-color);
        }

        .timeline-item:last-child {
            border: none;
        }

        .btn-submit {
            background-color: var(--primary-color);
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-danger {
            background-color: var(--danger-color);
        }

        .btn-danger:hover {
            background-color: #dc2626;
        }

        .action-footer {
            display: flex;
            gap: 12px;
            margin-top: 25px;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
            justify-content: flex-end;
        }

        /* Spinner */
        .spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Entrada Suave de Elemento (Fade In Up) */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            aside {
                width: 100%;
                height: auto;
                position: relative;
                padding: 20px;
            }
            main {
                padding: 20px;
            }
            .profile-columns {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <aside id="app-sidebar">
        <div>
            <h1>🐱 FelisHub</h1>
            <p class="subtitle">Gestão para Abrigos Felinos</p>
            <hr style="margin-bottom: 20px; border: 0; border-top: 1px solid var(--border-color);">
            
            <button class="tab-btn active" onclick="switchTab('gatil')">
                <i class="fa-solid fa-cat"></i> 🐈 Gatil
            </button>
            <button class="tab-btn" onclick="switchTab('cti')">
                <i class="fa-solid fa-hospital"></i> 🏥 CTI
            </button>

            <button class="btn-admit-trigger" onclick="openAdmitModal()">
                <i class="fa-solid fa-plus-circle"></i> Admitir Gato
            </button>
        </div>

        <div class="sidebar-footer">
            Desenvolvido por <strong>Rennan</strong>
        </div>
    </aside>

    <main id="app-main">
        
        <div id="tab-gatil" class="section active">
            <div class="search-bar-container">
                <div class="search-input-wrapper">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="search-gatil" onkeyup="filterCats('Gatil')" placeholder="Pesquisar por nome ou microchip no Gatil...">
                </div>
            </div>
            
            <div class="cats-grid" id="grid-gatil">
                </div>
        </div>

        <div id="tab-cti" class="section">
            <div class="search-bar-container">
                <div class="search-input-wrapper">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="search-cti" onkeyup="filterCats('CTI')" placeholder="Pesquisar por nome ou microchip no CTI...">
                </div>
            </div>

            <div class="cats-grid" id="grid-cti">
                </div>
        </div>

    </main>

    <div class="modal" id="modal-admissao">
        <div class="modal-content animate__animated animate__zoomIn">
            <button class="close-modal" onclick="closeAdmitModal()"><i class="fa-solid fa-xmark"></i></button>
            <h2 style="margin-top:0;"><i class="fa-solid fa-circle-plus" style="color:var(--primary-color);"></i> Nova Admissão de Paciente</h2>
            <form id="form-admissao" onsubmit="admitPatient(event)">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:15px;">
                    <div>
                        <label style="font-weight:bold; font-size:0.85rem; display:block; margin-bottom:5px;">Número do Microchip *</label>
                        <input type="text" id="adm-chip" required placeholder="Ex: 981020000...">
                    </div>
                    <div>
                        <label style="font-weight:bold; font-size:0.85rem; display:block; margin-bottom:5px;">Nome do Gato *</label>
                        <input type="text" id="adm-name" required placeholder="Ex: Mingau">
                    </div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:15px;">
                    <div>
                        <label style="font-weight:bold; font-size:0.85rem; display:block; margin-bottom:5px;">Idade Aproximada</label>
                        <input type="text" id="adm-age" placeholder="Ex: 2 anos">
                    </div>
                    <div>
                        <label style="font-weight:bold; font-size:0.85rem; display:block; margin-bottom:5px;">Setor de Entrada *</label>
                        <select id="adm-sector">
                            <option value="Gatil">🐈 Alojamento Comum (Gatil)</option>
                            <option value="CTI">🏥 Unidade de Terapia Intensiva (CTI)</option>
                        </select>
                    </div>
                </div>
                <div style="margin-bottom:15px;">
                    <label style="font-weight:bold; font-size:0.85rem; display:block; margin-bottom:5px;">Foto do Gatinho</label>
                    <input type="file" id="adm-photo" accept="image/*">
                </div>
                <div style="margin-bottom:20px;">
                    <label style="font-weight:bold; font-size:0.85rem; display:block; margin-bottom:5px;">Observações Iniciais</label>
                    <textarea id="adm-obs" rows="2" placeholder="Motivo da entrada..."></textarea>
                </div>
                <div style="text-align:right;">
                    <button type="submit" id="btn-admitir" class="btn-submit">
                        <i class="fa-solid fa-check"></i> Salvar Admissão
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal" id="modal-prontuario">
        <div class="modal-content animate__animated animate__zoomIn" style="max-width: 900px;">
            <button class="close-modal" onclick="closeProfileModal()"><i class="fa-solid fa-xmark"></i></button>
            
            <div class="profile-header">
                <div id="prof-avatar-container"></div>
                <div>
                    <h2 id="prof-name" style="margin:0; font-size:1.8rem; border:none; padding:0;">-</h2>
                    <p style="margin: 3px 0 0 0; color:#64748b;">
                        Microchip: <strong id="prof-chip" style="color:var(--text-color);">-</strong> | 
                        Idade Estimada: <strong id="prof-age" style="color:var(--text-color);">-</strong>
                    </p>
                </div>
                <div style="margin-left: auto;">
                    <span id="prof-status-badge" class="badge-status">-</span>
                </div>
            </div>

            <div class="profile-columns">
                
                <div class="profile-block">
                    <h4><i class="fa-solid fa-clock-rotate-left"></i> Histórico / Linha do Tempo</h4>
                    <div id="prof-history-list" style="max-height: 220px; overflow-y: auto; margin-bottom: 15px; padding-right:5px;">
                        </div>
                    <div>
                        <textarea id="prof-new-evolution" rows="2" placeholder="Digitar nova evolução clínica..." style="margin-bottom: 10px; font-size: 0.85rem;"></textarea>
                        <button class="btn-submit" onclick="addProfileEvolution()" style="font-size:0.85rem; padding:8px 16px;">
                            <i class="fa-solid fa-plus"></i> Adicionar Evolução
                        </button>
                    </div>
                </div>

                <div class="profile-block">
                    <h4><i class="fa-solid fa-pills" style="color:var(--primary-color)"></i> Tratamentos e Medicações</h4>
                    <div id="prof-meds-list" style="max-height: 200px; overflow-y: auto; margin-bottom: 15px;">
                        </div>
                    <div style="border-top:1px solid var(--border-color); padding-top:15px;">
                        <h5 style="margin:0 0 10px 0; color:#475569;">Prescrever Medicamento:</h5>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:10px;">
                            <input type="text" id="new-med-name" placeholder="Meloxicam 0.2mg" style="font-size:0.85rem; padding:8px;">
                            <input type="text" id="new-med-freq" placeholder="12h/12h" style="font-size:0.85rem; padding:8px;">
                        </div>
                        <input type="text" id="new-med-period" placeholder="Período: Ex 5 dias ou Contínuo" style="font-size:0.85rem; padding:8px; margin-bottom:10px;">
                        <button class="btn-submit" onclick="addProfileMedication()" style="font-size:0.85rem; padding:8px 16px; width:100%;">
                            <i class="fa-solid fa-prescription"></i> Adicionar Tratamento
                        </button>
                    </div>
                </div>

            </div>

            <div class="action-footer">
                <span style="margin-right:auto; align-self:center; font-size:0.85rem; color:#64748b;">
                    Ações de Fluxo de Leito:
                </span>
                <button id="btn-toggle-sector" class="btn-submit" style="background-color:#64748b;" onclick="togglePatientSector()">
                    <i class="fa-solid fa-right-left"></i> Transferir Setor
                </button>
                <button class="btn-submit btn-danger" onclick="confirmDeath()">
                    <i class="fa-solid fa-skull"></i> Registrar Óbito
                </button>
                <button class="btn-submit" style="background-color: var(--success-color);" onclick="confirmDischarge()">
                    <i class="fa-solid fa-circle-check"></i> Dar Alta do Abrigo
                </button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURAÇÃO DO SUPABASE (INSIRA SEUS DADOS AQUI!)
        // ==========================================
        const SUPABASE_URL = "SEU_SUPABASE_URL";
        const SUPABASE_KEY = "SUA_SUPABASE_ANON_KEY";

        // Inicializa o Cliente Supabase
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let cats = [];
        let activeCat = null; // Guarda o gato aberto no modal atualmente

        // Ao abrir a aplicação, fazemos o carregamento automático
        window.addEventListener('DOMContentLoaded', () => {
            console.log("Aplicação carregada. Buscando dados...");
            fetchCatsData();
            startRealtimeSubscription();
        });

        // ==========================================
        // LEITURA DOS DADOS (SUPABASE)
        // ==========================================
        async function fetchCatsData() {
            try {
                const { data, error } = await supabaseClient
                    .from('cats')
                    .select('*')
                    .order('name', { ascending: true });

                if (error) {
                    console.error("Erro ao carregar os dados:", error);
                    return;
                }

                cats = data.map(item => ({
                    id: item.id,
                    chip: item.chip,
                    name: item.name,
                    age: item.age,
                    status: item.status,
                    photo: item.photo,
                    history: item.history || [],
                    medications: item.medications || [],
                    exams: item.exams || [],
                    movements: item.movements || [],
                    updatedAt: item.updated_at
                }));

                renderGrids();
                
                // Se o prontuário estiver aberto, recarrega a tela para atualizar as infos dele em tempo real
                if (activeCat) {
                    const refreshed = cats.find(c => c.chip === activeCat.chip);
                    if (refreshed) {
                        activeCat = refreshed;
                        loadActiveCatProfile();
                    } else {
                        closeProfileModal();
                    }
                }
            } catch (err) {
                console.error("Falha na comunicação com Supabase:", err);
            }
        }

        function startRealtimeSubscription() {
            supabaseClient
                .channel('schema-db-changes')
                .on(
                    'postgres_changes',
                    { event: '*', schema: 'public', table: 'cats' },
                    payload => {
                        fetchCatsData();
                    }
                )
                .subscribe();
        }

        async function saveCatToSupabase(catObj) {
            const dbPayload = {
                chip: catObj.chip,
                name: catObj.name,
                age: catObj.age,
                status: catObj.status,
                photo: catObj.photo,
                history: catObj.history,
                medications: catObj.medications,
                exams: catObj.exams,
                movements: catObj.movements,
                updated_at: catObj.updatedAt
            };

            if (catObj.id) {
                const { error } = await supabaseClient
                    .from('cats')
                    .update(dbPayload)
                    .eq('id', catObj.id);
                if (error) throw new Error("Erro ao atualizar dados: " + error.message);
            } else {
                const { error } = await supabaseClient
                    .from('cats')
                    .insert([dbPayload]);
                if (error) throw new Error("Erro ao criar prontuário: " + error.message);
            }
        }

        // ==========================================
        // RENDERIZAÇÃO DOS CARD DE GATOS
        // ==========================================
        function renderGrids() {
            const gridGatil = document.getElementById('grid-gatil');
            const gridCti = document.getElementById('grid-cti');

            gridGatil.innerHTML = '';
            gridCti.innerHTML = '';

            let countGatil = 0;
            let countCti = 0;

            cats.forEach(cat => {
                if (cat.status !== 'Gatil' && cat.status !== 'CTI') return; // Filtra altas/óbitos fora do grid ativo

                const card = document.createElement('div');
                card.className = `cat-card ${cat.status === 'CTI' ? 'status-cti' : ''} animate__animated animate__fadeIn`;
                card.onclick = () => openProfileModal(cat);

                const photoHTML = cat.photo 
                    ? `<img src="${cat.photo}" alt="Foto de ${cat.name}">`
                    : `<div class="placeholder-avatar"><i class="fa-solid fa-cat"></i></div>`;

                card.innerHTML = `
                    ${photoHTML}
                    <h3>${cat.name}</h3>
                    <p>Microchip: <strong>${cat.chip}</strong></p>
                    <p>Idade: ${cat.age || 'Não informada'}</p>
                    <span class="badge-status ${cat.status === 'CTI' ? 'badge-cti' : 'badge-gatil'}">${cat.status}</span>
                `;

                if (cat.status === 'Gatil') {
                    gridGatil.appendChild(card);
                    countGatil++;
                } else if (cat.status === 'CTI') {
                    gridCti.appendChild(card);
                    countCti++;
                }
            });

            if (countGatil === 0) {
                gridGatil.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: #64748b;">Nenhum gatinho no Gatil no momento.</p>`;
            }
            if (countCti === 0) {
                gridCti.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: #64748b;">Nenhum gatinho em terapia intensiva no momento.</p>`;
            }
        }

        // Filtro em tempo real digitando
        function filterCats(sector) {
            const query = document.getElementById(`search-${sector.toLowerCase()}`).value.toLowerCase().trim();
            const cards = document.querySelectorAll(`#grid-${sector.toLowerCase()} .cat-card`);

            cards.forEach(card => {
                const text = card.innerText.toLowerCase();
                if (text.includes(query)) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        // ==========================================
        // FLUXO DOS MODAIS
        // ==========================================
        function openAdmitModal() {
            document.getElementById('modal-admissao').style.display = 'flex';
        }

        function closeAdmitModal() {
            document.getElementById('modal-admissao').style.display = 'none';
            document.getElementById('form-admissao').reset();
        }

        function openProfileModal(cat) {
            activeCat = cat;
            document.getElementById('modal-prontuario').style.display = 'flex';
            loadActiveCatProfile();
        }

        function closeProfileModal() {
            document.getElementById('modal-prontuario').style.display = 'none';
            activeCat = null;
        }

        // ==========================================
        // CARREGAMENTO DO PRONTUÁRIO COMPLETO
        // ==========================================
        function loadActiveCatProfile() {
            if (!activeCat) return;

            // Header do Gato
            document.getElementById('prof-name').innerText = activeCat.name;
            document.getElementById('prof-chip').innerText = activeCat.chip;
            document.getElementById('prof-age').innerText = activeCat.age || 'Não informada';
            
            const avatarContainer = document.getElementById('prof-avatar-container');
            avatarContainer.innerHTML = activeCat.photo
                ? `<img src="${activeCat.photo}" alt="Foto de ${activeCat.name}">`
                : `<div class="placeholder-avatar"><i class="fa-solid fa-cat"></i></div>`;

            const badge = document.getElementById('prof-status-badge');
            badge.innerText = activeCat.status;
            badge.className = `badge-status ${activeCat.status === 'CTI' ? 'badge-cti' : 'badge-gatil'}`;

            // Botão rápido de Toggle de Setor
            const btnSector = document.getElementById('btn-toggle-sector');
            btnSector.innerHTML = activeCat.status === 'Gatil' 
                ? `<i class="fa-solid fa-hospital"></i> Mover para CTI`
                : `<i class="fa-solid fa-cat"></i> Mover para Gatil`;

            // Histórico / Linha do tempo
            const historyList = document.getElementById('prof-history-list');
            const history = activeCat.history || [];
            historyList.innerHTML = history.map(h => `
                <div class="timeline-item">
                    ${h}
                </div>
            `).reverse().join('') || '<p style="color:#64748b; font-size:0.85rem;">Sem anotações registradas.</p>';

            // Medicações Ativas
            const medsList = document.getElementById('prof-meds-list');
            const medications = activeCat.medications || [];
            medsList.innerHTML = medications.map((med, index) => `
                <div style="padding: 10px; background-color: #fff; border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 8px; display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <strong style="font-size:0.9rem;">${med.name}</strong><br>
                        <span style="font-size:0.8rem; color:#64748b;">${med.freq} - ${med.period}</span>
                    </div>
                    <button onclick="removeProfileMedication(${index})" style="background:none; border:none; color:var(--danger-color); cursor:pointer; font-size:0.85rem;">
                        <i class="fa-solid fa-ban"></i> Suspender
                    </button>
                </div>
            `).join('') || '<p style="color:#64748b; font-size:0.85rem;">Nenhum tratamento ativo no momento.</p>';
        }

        // Adicionar Evolução
        async function addProfileEvolution() {
            const input = document.getElementById('prof-new-evolution');
            const text = input.value.trim();
            if (!text) return;

            const today = new Date().toLocaleDateString('pt-BR');
            activeCat.history = activeCat.history || [];
            activeCat.history.push(`${today}: ${text}`);
            activeCat.updatedAt = today;

            try {
                await saveCatToSupabase(activeCat);
                input.value = '';
                loadActiveCatProfile();
            } catch (err) {
                alert(err.message + " | Verifique as permissões de gravação no banco.");
            }
        }

        // Adicionar Medicação Direto no Perfil
        async function addProfileMedication() {
            const name = document.getElementById('new-med-name').value.trim();
            const freq = document.getElementById('new-med-freq').value.trim();
            const period = document.getElementById('new-med-period').value.trim() || 'Contínuo';

            if (!name || !freq) {
                alert("Preencha o Nome e a Frequência da medicação!");
                return;
            }

            const today = new Date().toLocaleDateString('pt-BR');
            activeCat.medications = activeCat.medications || [];
            activeCat.medications.push({ name, freq, period });
            
            activeCat.history = activeCat.history || [];
            activeCat.history.push(`${today}: Prescrito ${name} (${freq} - Período: ${period})`);
            activeCat.updatedAt = today;

            try {
                await saveCatToSupabase(activeCat);
                document.getElementById('new-med-name').value = '';
                document.getElementById('new-med-freq').value = '';
                document.getElementById('new-med-period').value = '';
                loadActiveCatProfile();
            } catch (err) {
                alert(err.message);
            }
        }

        // Suspender Medicação
        async function removeProfileMedication(index) {
            if (!activeCat) return;
            const today = new Date().toLocaleDateString('pt-BR');
            const removed = activeCat.medications.splice(index, 1)[0];
            
            activeCat.history.push(`${today}: Suspenso medicamento ${removed.name}.`);
            activeCat.updatedAt = today;

            try {
                await saveCatToSupabase(activeCat);
                loadActiveCatProfile();
            } catch (err) {
                alert(err.message);
            }
        }

        // ==========================================
        // AÇÕES DE FLUXO E ALTA DO ABRIGO
        // ==========================================
        async function togglePatientSector() {
            if (!activeCat) return;
            const today = new Date().toLocaleDateString('pt-BR');
            const origin = activeCat.status;
            const dest = origin === 'Gatil' ? 'CTI' : 'Gatil';

            activeCat.status = dest;
            activeCat.updatedAt = today;
            activeCat.movements.push({ from: origin, to: dest, date: today });
            activeCat.history.push(`${today}: Transferência de setor de ${origin} para ${dest}.`);

            try {
                await saveCatToSupabase(activeCat);
                loadActiveCatProfile();
                alert(`${activeCat.name} transferido para o ${dest}!`);
            } catch (err) {
                alert(err.message);
            }
        }

        async function confirmDeath() {
            if (!activeCat) return;
            if (confirm(`Tem certeza de que deseja registrar o óbito do gatinho ${activeCat.name}? Esta ação irá removê-lo da fila de leitos ativos.`)) {
                const today = new Date().toLocaleDateString('pt-BR');
                const origin = activeCat.status;
                
                activeCat.status = 'Óbito';
                activeCat.updatedAt = today;
                activeCat.movements.push({ from: origin, to: 'Óbito', date: today });
                activeCat.history.push(`${today}: Óbito confirmado no setor ${origin}.`);

                try {
                    await saveCatToSupabase(activeCat);
                    closeProfileModal();
                    alert(`Óbito do gatinho ${activeCat.name} registrado.`);
                } catch (err) {
                    alert(err.message);
                }
            }
        }

        async function confirmDischarge() {
            if (!activeCat) return;
            if (confirm(`Confirmar alta médica/Adoção de ${activeCat.name}?`)) {
                const today = new Date().toLocaleDateString('pt-BR');
                const origin = activeCat.status;
                
                activeCat.status = 'Alta';
                activeCat.updatedAt = today;
                activeCat.movements.push({ from: origin, to: 'Alta', date: today });
                activeCat.history.push(`${today}: Paciente recebeu alta ou foi adotado saindo do setor ${origin}.`);

                try {
                    await saveCatToSupabase(activeCat);
                    closeProfileModal();
                    alert(`Alta realizada com sucesso para ${activeCat.name}!`);
                } catch (err) {
                    alert(err.message);
                }
            }
        }

        // Compression Helper com tratamento robusto e timeout
        function compressAndResizeImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                
                // Configura um timeout de 4 segundos para evitar que fique preso para sempre
                const timeout = setTimeout(() => {
                    reject(new Error("A compressão da foto demorou demasiado tempo."));
                }, 4000);

                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        try {
                            const canvas = document.createElement('canvas');
                            const MAX_SIZE = 150;
                            let width = img.width;
                            let height = img.height;

                            if (width > height) {
                                if (width > MAX_SIZE) {
                                    height *= MAX_SIZE / width;
                                    width = MAX_SIZE;
                                }
                            } else {
                                if (height > MAX_SIZE) {
                                    width *= MAX_SIZE / height;
                                    height = MAX_SIZE;
                                }
                            }

                            canvas.width = width;
                            canvas.height = height;

                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);

                            const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6);
                            clearTimeout(timeout);
                            resolve(compressedBase64);
                        } catch (err) {
                            clearTimeout(timeout);
                            reject(err);
                        }
                    };
                    img.onerror = function() {
                        clearTimeout(timeout);
                        reject(new Error("Erro ao ler dados da imagem."));
                    };
                    img.src = event.target.result;
                };
                
                reader.onerror = function() {
                    clearTimeout(timeout);
                    reject(new Error("Erro ao carregar o ficheiro de imagem."));
                };
                
                reader.readAsDataURL(file);
            });
        }

        // Admissão com Fluxo Blindado
        async function admitPatient(event) {
            event.preventDefault();
            console.log("Iniciando processo de admissão...");
            
            const btn = document.getElementById('btn-admitir');
            const originalHTML = btn.innerHTML;
            
            // Ativa animação visual no botão
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-circle-notch spinner"></i> Gravando...`;

            try {
                const chip = document.getElementById('adm-chip').value.trim();
                const name = document.getElementById('adm-name').value.trim();
                const age = document.getElementById('adm-age').value.trim();
                const obs = document.getElementById('adm-obs').value.trim();
                const sector = document.getElementById('adm-sector').value;
                const photoInput = document.getElementById('adm-photo');

                console.log("Dados capturados:", { chip, name, age, sector });

                if (cats.some(c => c.chip === chip)) {
                    alert("Este Microchip já se encontra cadastrado!");
                    btn.disabled = false;
                    btn.innerHTML = originalHTML;
                    return;
                }

                let photoBase64 = null;

                // Processa a imagem se houver
                if (photoInput.files && photoInput.files[0]) {
                    console.log("Processando foto...");
                    try {
                        photoBase64 = await compressAndResizeImage(photoInput.files[0]);
                        console.log("Foto comprimida com sucesso.");
                    } catch (imageError) {
                        console.warn("Falha ao carregar imagem:", imageError);
                        const continueWithoutPhoto = confirm("Não conseguimos processar a foto selecionada. Deseja cadastrar o gatinho sem foto?");
                        if (!continueWithoutPhoto) {
                            btn.disabled = false;
                            btn.innerHTML = originalHTML;
                            return;
                        }
                    }
                }

                const today = new Date().toLocaleDateString('pt-BR');
                const newCat = {
                    chip,
                    name,
                    age,
                    status: sector,
                    photo: photoBase64,
                    history: [obs ? `${today}: Entrada no Abrigo - ${obs}` : `${today}: Entrada no Abrigo no setor ${sector}.`],
                    medications: [],
                    exams: [],
                    movements: [{ from: "Admissão", to: sector, date: today }],
                    updatedAt: today
                };

                console.log("Enviando dados para o Supabase...");
                await saveCatToSupabase(newCat);
                console.log("Salvo no Supabase com sucesso!");
                
                closeAdmitModal();
                alert(`${name} admitido com sucesso no ${sector}!`);

            } catch (err) {
                console.error("Erro fatal durante admissão:", err);
                alert("Erro ao admitir gatinho: " + err.message + "\n\nSe o erro persistir, verifique se inseriu corretamente o SUPABASE_URL e a SUPABASE_KEY no topo do script ou se as regras de RLS na tabela 'cats' permitem inserção pública.");
            } finally {
                // Restaura o botão independentemente do sucesso ou falha
                btn.disabled = false;
                btn.innerHTML = originalHTML;
            }
        }

        // Controle de Abas Simples
        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));

            const activeBtn = Array.from(document.querySelectorAll('.tab-btn')).find(btn => btn.getAttribute('onclick').includes(tabId));
            if (activeBtn) activeBtn.classList.add('active');

            document.getElementById(`tab-${tabId}`).classList.add('active');
        }
    </script>
